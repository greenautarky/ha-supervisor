name: Build greenautarky Supervisor image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 2025.11.4-ga.1)"
        required: true
        default: "2025.11.4-ga.1"
  push:
    branches:
      - ga/custom-version-url

env:
  IMAGE: ghcr.io/greenautarky/armv7-hassio-supervisor
  BUILD_FROM: ghcr.io/home-assistant/armv7-base-python:3.13-alpine3.22
  COSIGN_VERSION: "2.5.3"

jobs:
  build:
    name: Build and push armv7 Supervisor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          no-cache: true
          platforms: linux/arm/v7
          build-args: |
            BUILD_FROM=${{ env.BUILD_FROM }}
            BUILD_ARCH=armv7
            COSIGN_VERSION=${{ env.COSIGN_VERSION }}
          labels: |
            io.hass.type=supervisor
            io.hass.arch=armv7
            io.hass.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.title=Home Assistant Supervisor
            org.opencontainers.image.version=${{ steps.version.outputs.tag }}
            org.opencontainers.image.source=https://github.com/greenautarky/ha-supervisor
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE }}:latest
